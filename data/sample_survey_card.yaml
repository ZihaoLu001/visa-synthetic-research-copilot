questions:
  - id: Q1
    text: "How likely would you be to adopt this card if it were offered by your bank?"
    type: likert
    options: []
    scale_min: 1
    scale_max: 5
    measures: "adoption likelihood"

  - id: Q2
    text: "What annual fee in CHF would feel acceptable for this card?"
    type: price
    options: []
    measures: "price sensitivity"

  - id: Q3
    text: "Which benefit or feature feels most valuable to you, and why?"
    type: open
    options: []
    measures: "feature preference"

  - id: Q4
    text: "What is the main barrier that would prevent you from using this card?"
    type: open
    options: []
    measures: "barriers"
