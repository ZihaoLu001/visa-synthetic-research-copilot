questions:
  - id: Q1
    text: "How relevant is this value proposition for your everyday payment or banking needs?"
    type: likert
    options: []
    scale_min: 1
    scale_max: 5
    measures: "adoption likelihood"

  - id: Q2
    text: "What annual fee or monthly price in CHF would feel acceptable, if any?"
    type: price
    options: []
    measures: "price sensitivity"

  - id: Q3
    text: "Which benefit, service or message feels most valuable to you, and why?"
    type: open
    options: []
    measures: "feature preference"

  - id: Q4
    text: "What is the main barrier or concern that would stop you from using it?"
    type: open
    options: []
    measures: "barriers"
