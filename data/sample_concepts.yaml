concepts:
  - id: A
    name: Premium Travel Card
    description: "A credit card for Swiss consumers who travel regularly. Includes travel insurance, FX fee reduction, airport lounge vouchers, mobile wallet support, and purchase protection."
    annual_fee_chf: 120
    features:
      - travel insurance
      - FX fee reduction
      - lounge vouchers
      - purchase protection
      - mobile wallet
    target_context: "Card value proposition for Swiss frequent travelers and affluent consumers"

  - id: B
    name: Everyday Cashback Card
    description: "A lower-fee card for everyday spending. Includes grocery cashback, family offers, simple digital onboarding, purchase protection messaging, and mobile wallet support."
    annual_fee_chf: 60
    features:
      - grocery cashback
      - family offers
      - purchase protection messaging
      - mobile wallet
      - simple onboarding
    target_context: "Broad-market card value proposition for Swiss everyday spending"
